services:
  - type: web
    name: smart-clinic-api
    runtime: node
    rootDir: backend
    plan: free
    region: singapore
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    autoDeployTrigger: commit
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGO_URI
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: CLIENT_URL
        value: "*"
      - key: SERVER_PUBLIC_URL
        sync: false
      - key: ADMIN_EMAIL
        value: admin@clinic.com
      - key: ADMIN_PASSWORD
        sync: false
      - key: ADMIN_FIRST_NAME
        value: System
      - key: ADMIN_LAST_NAME
        value: Admin
      - key: ADMIN_PHONE
        value: "0710000000"
      - key: APPOINTMENT_FEE_AMOUNT
        value: "2500"
      - key: APPOINTMENT_FEE_CURRENCY
        value: LKR
      - key: PAYMENT_DUE_WINDOW_MINUTES
        value: "30"
      - key: PAYPAL_MODE
        value: sandbox
      - key: PAYPAL_SETTLEMENT_CURRENCY
        value: USD
      - key: PAYPAL_LKR_PER_USD
        value: "300"
      - key: PAYPAL_CLIENT_ID
        sync: false
      - key: PAYPAL_CLIENT_SECRET
        sync: false
